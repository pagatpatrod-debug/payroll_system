<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Payroll System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f4f6f9;
            overflow-x: hidden;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .sidebar a {
            text-decoration: none;
            padding: 12px;
            display: block;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background-color: #495057;
        }

        /* Gi-adjust aron dili masalipdan sa fixed sidebar ang sulod */
        .main-content {
            margin-left: 250px;
            padding: 30px;
            width: calc(100% - 250px); 
        }

        .topbar {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.05);
        }

        .card-box {
            border-radius: 12px;
            padding: 20px;
            color: white;
        }
    </style>
</head>

<body>

<div class="d-flex">

    <div class="sidebar bg-dark text-white p-3">

        <h3 class="mb-4">
            <i class="bi bi-building"></i> HR System
        </h3>

        <a href="{% url 'dashboard' %}" class="text-white">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a href="{% url 'employee_list' %}" class="text-white">
            <i class="bi bi-people"></i> Employees
        </a>

        <a href="{% url 'payroll_list' %}" class="text-white">
            <i class="bi bi-cash-stack"></i> Payroll
        </a>

        <a href="/admin/" class="text-white" target="_blank">
            <i class="bi bi-shield-lock"></i> Admin
        </a>

    </div>

    <div class="main-content">

        <div class="topbar d-flex justify-content-between align-items-center">
            <h4>HR Payroll Management System</h4>

            <div>
                <span class="me-3">Welcome Admin</span>
                <a href="{% url 'login' %}" class="btn btn-danger btn-sm">Logout</a>
            </div>
        </div>

        {% block content %}
        {% endblock %}

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
