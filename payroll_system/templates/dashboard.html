{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">Dashboard Overview</h2>
    
    <div class="row g-4">
        <div class="col-md-6 col-lg-4">
            <div class="card-box bg-primary shadow-sm d-flex align-items-center justify-content-between">
                <div>
                    <h5 class="card-title text-white-50">Total Employees</h5>
                    <h2 class="display-5 fw-bold m-0">{{ employee_count }}</h2>
                </div>
                <div class="fs-1 text-white-50">
                    <i class="bi bi-people-fill"></i>
                </div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card-box bg-success shadow-sm d-flex align-items-center justify-content-between">
                <div>
                    <h5 class="card-title text-white-50">Total Payroll Records</h5>
                    <h2 class="display-5 fw-bold m-0">{{ payroll_count }}</h2>
                </div>
                <div class="fs-1 text-white-50">
                    <i class="bi bi-cash-stack"></i>
                </div>
            </div>
        </div>
    </div>
    
    <div class="mt-5 p-4 bg-white rounded-3 shadow-sm">
        <h4>Welcome to HR Payroll System</h4>
        <p class="text-muted">Gamita ang sidebar sa wala aron mag-manage sa mga Empleyado o Payroll sa kompanya.</p>
    </div>
</div>
{% endblock %}
